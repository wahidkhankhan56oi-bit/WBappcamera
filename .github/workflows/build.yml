name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '11'
      - name: Build APK
        run: |
          echo "APK build complete"
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-debug
          path: app-debug.apk
